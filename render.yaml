# render.yaml — Render Blueprint for TTFoodie API
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: ttfoodie-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: GEMINI_API_KEY
        sync: false        # must be set manually in dashboard
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Vercel URL after deploying frontend
